# Continuous integration: runs on push/PR so every change in source control is built and validated.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Python backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: my-app/backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: my-app/backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Import check
        run: python -c "import main; import bio"

  electron:
    name: Electron app (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: my-app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: my-app/package-lock.json

      - name: Linux build dependencies (Electron)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-0 libnotify4 libnss3 libxss1 libxtst6 xauth libasound2

      - name: Install npm dependencies
        run: npm ci

      - name: Package Electron app
        run: npm run package

  docker-backend:
    name: Backend Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v6
        with:
          context: ./my-app/backend
          file: ./my-app/backend/Dockerfile
          push: false
          tags: enrichment-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
